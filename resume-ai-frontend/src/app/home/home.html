<div class="landing-container">
  <nav class="navbar">
    <div class="logo">
      <div class="logo-icon">
        <i class="pi pi-bolt"></i>
      </div>
      <h2>ResumeAI</h2>
    </div>
    <div class="nav-actions">
      <p-button label="Sign In" styleClass="p-button-text p-button-secondary font-semibold" routerLink="/login"></p-button>
      <p-button label="Get Started" styleClass="p-button-primary rounded-btn font-semibold" routerLink="/register"></p-button>
    </div>
  </nav>

  <main class="hero-section">
    <div class="hero-content">
      <div class="badge">✨ AI-Powered Career Growth</div>
      <h1 class="hero-title">Outsmart the ATS.<br>Land Your Dream Role.</h1>
      <p class="hero-subtitle">
        Enterprise-grade resume analysis. Upload your CV, get an instant ATS compatibility score, and receive actionable, AI-driven insights to secure more interviews.
      </p>
      <div class="hero-buttons">
        <p-button label="Analyze My Resume" icon="pi pi-arrow-right" iconPos="right" size="large" styleClass="p-button-primary shadow-btn" routerLink="/register"></p-button>
        <p-button label="View Sample Report" icon="pi pi-chart-bar" size="large" styleClass="p-button-outlined p-button-secondary" routerLink="/login"></p-button>
      </div>
      <div class="trust-indicators">
        <p><i class="pi pi-check-circle"></i> Bank-level security</p>
        <p><i class="pi pi-check-circle"></i> Instant results</p>
        <p><i class="pi pi-check-circle"></i> Gemini AI Engine</p>
      </div>
    </div>
    
    <div class="hero-visual">
      <div class="glass-panel">
        <div class="mockup-header">
           <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
        </div>
        <div class="mockup-body">
            <div class="skeleton-line title"></div>
            <div class="skeleton-line short"></div>
            <div class="score-circle">
              <span>92</span>
            </div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line"></div>
        </div>
      </div>
    </div>
  </main>
</div>
